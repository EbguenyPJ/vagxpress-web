<div class="dialogContainer">
    <div class="modalHeader">
        <div class="modalTitle">{{ dialogTitle }}</div>

        <button type="button" class="modal-close-button btn" mat-dialog-close>
            ✕
        </button>
    </div>

    <div class="form-card">
        <form [formGroup]="clientesForm" (ngSubmit)="submit()">

            <!-- ================= NOMBRE / RAZÓN SOCIAL ================= -->
            <div class="row m-b-25">
                <div class="col-sm-6 mt-3">
                    <label class="form-label">Nombre del cliente</label>
                    <input class="form-control" formControlName="s_nombre_cliente">
                    <div class="text-danger" *ngIf="clientesForm.get('s_nombre_cliente')?.hasError('required')">
                        El nombre es obligatorio
                    </div>
                </div>

                <div class="col-sm-6 mt-3">
                    <label class="form-label">Razón social</label>
                    <input class="form-control" formControlName="s_razon_social">
                </div>
            </div>

            <!-- ================= RFC / INE ================= -->
            <div class="row m-b-25">
                <div class="col-sm-6 mt-3">
                    <label class="form-label">RFC</label>
                    <input class="form-control" formControlName="s_rfc">
                </div>

                <div class="col-sm-6 mt-3">
                    <label class="form-label">INE</label>
                    <input class="form-control" formControlName="s_ine">
                </div>
            </div>

            <!-- ================= TELÉFONO / CORREO ================= -->
            <div class="row m-b-25">
                <div class="col-sm-6 mt-3">
                    <label class="form-label">Teléfono</label>
                    <input type="tel" maxlength="10" class="form-control" formControlName="s_numero_telefono"
                        (keypress)="soloNumeros($event)">
                    <div class="text-danger" *ngIf="clientesForm.get('s_numero_telefono')?.hasError('required')">
                        El teléfono es obligatorio
                    </div>
                </div>

                <div class="col-sm-6 mt-3">
                    <label class="form-label">Correo</label>
                    <input type="email" class="form-control" formControlName="s_correo">
                    <div class="text-danger" *ngIf="clientesForm.get('s_correo')?.hasError('email')">
                        Correo inválido
                    </div>
                </div>
            </div>

            <!-- ================= TIPO DE CLIENTE ================= -->
            <div class="row m-b-25">
                <div class="col-sm-6 mt-3">
                    <label class="form-label">Tipo de cliente</label>
                    <select class="form-select" formControlName="id_tipo_cliente">
                        <option value="">Seleccione</option>
                        <option *ngFor="let tipo of tiposClientes" [value]="tipo.id_tipo_cliente">
                            {{ tipo.s_tipo_cliente }}
                        </option>
                    </select>
                    <div class="text-danger" *ngIf="clientesForm.get('id_tipo_cliente')?.hasError('required')">
                        El tipo de cliente es obligatorio
                    </div>
                </div>
            </div>

            <!-- ================= BOTONES ================= -->
            <div class="example-button-row">
                <button type="submit" class="formSubmitBtn" [disabled]="clientesForm.invalid || clientesForm.pending">
                    Guardar
                </button>

                <button type="button" class="formCancelBtn" mat-dialog-close>
                    Cancelar
                </button>
            </div>

        </form>
    </div>
</div>
