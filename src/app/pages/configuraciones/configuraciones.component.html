<section class="content">
    <div class="content-block">
        <!-- Título -->
        <div class="row mt-3 justify-content-center align-items-center">
            <div class="col-auto d-flex align-items-center">
                <img src="assets/images/pages/logo.png" alt="Taller" class="header-img me-3"
                    style="margin-top:-25px; max-width:80px; height:auto;">
                <div class="text-center">
                    <h1>Configuraciones</h1>
                    <p>Bienvenido a la sección de Configuraciones.</p>
                </div>
            </div>
        </div>

        <div class="row mt-4">
            <div class="col-12">
                <mat-card class="main-card">
                    <mat-card-header>
                        <mat-card-title class="titulo-seccion">Panel de Configuraciones</mat-card-title>
                    </mat-card-header>

                    <mat-card-content>
                        <div class="row config-grid">
                            @for (option of configOptions; track option.title) {
                            <div class="col-xl-3 col-lg-4 col-md-6 col-sm-6 mb-4">
                                <mat-card class="config-card" [class.disabled-card]="!option.available"
                                    [class.hover-enabled]="option.available"
                                    (click)="option.available && navegar(option.route)"
                                    [matTooltip]="!option.available ? 'Función en desarrollo' : ''">

                                    <mat-card-header>
                                        <mat-icon mat-card-avatar class="card-icon" [ngClass]="option.iconColorClass">
                                            {{ option.icon }}
                                        </mat-icon>
                                        <mat-card-title>{{option.title}}</mat-card-title>
                                    </mat-card-header>

                                    <mat-card-content class="card-description">
                                        <p>{{option.description}}</p>
                                    </mat-card-content>
                                </mat-card>
                            </div>
                            }
                        </div>
                    </mat-card-content>
                </mat-card>
            </div>
        </div>
    </div>
</section>
