<section class="content">
    <div class="content-block">
        <div class="container mt-4">
            <div class="row g-4">

                <div class="col-12 col-md-6 col-lg-4" *ngFor="let reparto of repartos">
                <div class="card h-100 shadow-sm border-0 rounded-4">

                    <!-- Header -->
                    <div class="card-body">

                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="text-muted fw-semibold">
                        Orden #{{ reparto?.id_orden }}
                        </span>

                        <span
                        class="badge rounded-pill"
                        [ngClass]="{
                            'bg-warning text-dark': reparto?.s_estatus_orden === 'PENDIENTE',
                            'bg-primary': reparto?.s_estatus_orden === 'EN_PROCESO',
                            'bg-success': reparto?.s_estatus_orden === 'ENTREGADO'
                        }"
                        >
                        {{ reparto?.s_estatus_orden }}
                        </span>
                    </div>

                    <!-- Body -->
                    <h5 class="card-title fw-bold mb-2">
                        {{ reparto?.s_nombre_destino }}
                    </h5>

                    <p class="card-text text-muted small">
                        <i class="bi bi-geo-alt-fill me-1"></i>
                        {{ reparto?.s_direccion }}
                    </p>

                    </div>

                    <!-- Footer -->
                    <div class="card-footer bg-transparent border-0 pt-0 pb-3 px-3">
                    <button class="btn btn-outline-primary btn-sm w-100" (click)="abrirDetalleReparto(reparto.id_orden)">
                        Ver detalle
                    </button>
                    </div>

                </div>
                </div>

            </div>
        </div>

    </div>
</section>
